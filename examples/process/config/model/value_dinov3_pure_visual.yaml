# Value model config for inference (DINOv3 pure visual backbone)
backbone_variant: "dinov3_pure_visual"
vision_encoder_path: /path/to/dinov3-89m

aggregator_hidden_size: 256
aggregator_depth: 2
aggregator_num_heads: 4
aggregator_mlp_ratio: 4.0

critic_expert_variant: "dummy"
expert_loss_type: "mse"
num_bins: 201
v_min: -1.0
v_max: 0.0
