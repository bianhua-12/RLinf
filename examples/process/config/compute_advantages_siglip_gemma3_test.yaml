# Test config for compute_advantages (SigLIP-Gemma3 backbone)
#
# Usage:
#   cd examples/process
#   bash run_compute_advantages.sh compute_advantages_siglip_gemma3_test --nproc 1 \
#       advantage.value_checkpoint=/tmp/step2_ckpt

defaults:
  - model/value_siglip_gemma3@advantage.model

advantage:
  value_checkpoint: /tmp/step2_ckpt

  device: "cuda"
  batch_size: 4
  flush_interval: 4096
  num_dataloader_workers: 2
  prefetch_factor: 2
  discount_next_value: true
  positive_quantile: 0.3
  tag: "test"

  value_mode: "expert_categorical"

  model:
    critic_expert_variant: "gemma_1m"
    siglip_path: null   # REQUIRED: set via CLI or override
    gemma3_path: null    # REQUIRED: set via CLI or override
    tokenizer_path: null # REQUIRED: set via CLI or override

data:
  model_type: "pi05"
  robot_type: "libero"

  train_data_paths:
    - dataset_path: "/mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot"
      robot_type: "libero"
      dataset_type: "sft"
      weight: 1.0

    - dataset_path: "/mnt/project_rlinf_hs/liuzhihao/data_to_use/collected_data_40_eps"
      robot_type: "libero"
      dataset_type: "rollout"
      weight: 1.0

  action_horizon: 10
  advantage_horizon: 10
  gamma: 1.0

distributed:
  enabled: false
  backend: "nccl"
  timeout: 1800

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
