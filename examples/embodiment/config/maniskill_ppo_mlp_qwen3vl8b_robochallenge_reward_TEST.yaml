# RoboChallenge PPO (MLP policy) with Qwen3-VL reward model
# Reward model checkpoint: /workspace/ckpts/qwen3vl-8b-robochallenge-stack-bowls-sft-80

defaults:
  - env/maniskill_pick_cube_prompt@env.train
  - env/maniskill_pick_cube_prompt@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    # actor: 4-5
    # env: 0-3
    # rollout: 4-5
    # reward: 6-7  # Add reward worker placement # Add reward worker placement
    actor: all
    env: all
    rollout: all
    reward: all
runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_ppo_mlp_qwen3vl8b_robochallenge_reward_TEST"
    # logger_backends: ["wandb", "tensorboard"]
    logger_backends: ["tensorboard"] # TEST ONLY

  max_epochs: 5
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 50
  save_interval: 100

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  update_epoch: 1
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  
  bootstrap_type: always # [standard, always]. Bootstrap Q-values according to terminations and truncations. "standard" only bootstraps when truncations, while "always" bootstraps when truncations or terminations.
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.8
  gae_lambda: 0.9

  # params for rollout
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

data:
  rollout_batch_size: 128

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 4 # 128 no sr
    wrap_obs_mode: simple_prompt
    auto_reset: True
    ignore_terminations: False
    use_rel_reward: False
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_full_state: True
    # RGB mode: obs contains both main_images (for reward) and states (for policy)
    is_eval: False
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"  # RGB mode provides main_images + states
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/train      # set True to discard failed episodes

  eval:
    total_num_envs: 32
    wrap_obs_mode: simple_prompt
    auto_reset: True
    ignore_terminations: True
    use_rel_reward: False
    reward_mode: raw
    seed: 0
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    use_full_state: True
    is_eval: True
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ""
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 4
  seed: 1234
  enable_offload: False

  # Override the default values in model/mlp_policy
  model:
    model_path: ""
    model_type: "mlp_policy"
    # obs_dim: 42  # Full state dimension

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

# -----------------------------------------------------------------------------
# Reward Model Configuration (trained ResNet reward model)
# -----------------------------------------------------------------------------
reward:
  use_reward_model: True
  group_name: "RewardGroup"
  
  # Reward mode:
  # - "per_step": Compute reward for every frame (default, prone to reward hacking)
  # - "terminal": Only compute reward at episode end (last frame), prevents reward hacking
  # reward_mode: "terminal"
  reward_mode: "history_buffer"

  reward_threshold: 0.5 # Probability threshold for success/fail classification
  
  use_output_step: 0

  # How to combine learned rewards with environment rewards:
  # Weighted sum (reward = env_reward_weight * env_reward + reward_weight * reward_model_reward)
  reward_weight: 1.0
  env_reward_weight: 0.0

  history:
    
  
  model:
    model_type: "history_vlm"
    # SFT checkpoint trained with RoboChallenge video QA + JSON answers
    model_path: "/workspace/ckpts/qwen3vl-8b-robochallenge-stack-bowls-sft-80"
    precision: "bf16"

    # Match current VLMRewardModel code keys:
    # - input_builder_name -> get_input_builder(...)
    # - reward_parser_name -> get_reward_parser(...)
    input_builder_name: "robochanallenge_input_builder"
    reward_parser_name: "robochallenge_reward_parser"
    history_buffers:
      full_history:
        history_size: 50
        input_interval: 10
        history_keys: ["main_images"]
        input_on_done: false
      history_window:
        history_size: 10
        input_interval: 10
        history_keys: ["main_images"]
        input_on_done: false

    enable_history_offload: true
    infer_micro_batch_size: 64

    subprocessor_kwargs:
      video_processor:
        do_sample_frames: True
        fps: 14.4 # 24.0 * 0.6

    # Keep generation cheap for RL loop.
    max_new_tokens: 256 # NOTE: mimic examples/agent/coding_online_rl/config/qwen2.5-1.5b-grpo-llm_judge.yaml
    temperature: 1.0
    use_chat_template: true

critic:
  use_critic_model: False
