# RoboChallenge PPO (MLP policy) with Qwen3-VL reward model
# Reward model checkpoint: /workspace/ckpts/qwen3vl-8b-robochallenge-stack-bowls-sft-80

defaults:
  - env/maniskill_pick_cube_prompt@env.train
  - env/maniskill_pick_cube_prompt@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: all
    env: all
    rollout: all
    reward: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "TEST_robochallenge_reward_from_sft_qwen3vl8b_stack_bowls_sft_80"
    logger_backends: ["tensorboard"]

  # Keep short to validate VLMRewardModel pipeline.
  max_epochs: 5
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 100
  save_interval: 100
  resume_dir: null

algorithm:
  update_epoch: 2
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.8
  gae_lambda: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

data:
  # RewardInferenceWorker depends on cfg.data.rollout_batch_size
  rollout_batch_size: 4

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 4
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 30
    max_steps_per_rollout_epoch: 30
    use_full_state: True
    # RGB mode: obs contains both main_images (for reward) and states (for policy)
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"  # RGB mode provides main_images + states
      control_mode: None
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      render_mode: all
      sensor_configs:
        base_camera:
          width: 224
          height: 224
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    total_num_envs: 2
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 25
    max_steps_per_rollout_epoch: 25
    use_fixed_reset_state_ids: True
    group_size: 1
    use_full_state: True
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"
      control_mode: None
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        base_camera:
          width: 224
          height: 224
      render_mode: all
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: ""
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 4
  seed: 1234
  enable_offload: False

  # MLP policy uses state observation from ManiskillFullStateWrapper
  model:
    model_path: ""
    model_type: "mlp_policy"
    obs_dim: 42  # Full state dimension

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

# -----------------------------------------------------------------------------
# Reward Model Configuration: Qwen3-VL-8B (RoboChallenge reward JSON)
# -----------------------------------------------------------------------------
reward:
  use_reward_model: True
  group_name: "RewardGroup"

  # For PPO reward streaming: request reward every env step/chunk.
  reward_mode: "per_step"

  use_output_step: 1

  reward_weight: 1.0
  env_reward_weight: 0.0
  
  model:
    model_type: "history_vlm"
    # SFT checkpoint trained with RoboChallenge video QA + JSON answers
    model_path: "/workspace/ckpts/qwen3vl-8b-robochallenge-stack-bowls-sft-80"
    precision: "bf16"

    # Match current VLMRewardModel code keys:
    # - input_builder_name -> get_input_builder(...)
    # - reward_parser_name -> get_reward_parser(...)
    input_builder_name: "robochanallenge_input_builder"
    reward_parser_name: "robochallenge_reward_parser"

    interval_return_mode: "zero"
    history_window_mode: "fixed"
    history_window_size: 10
    history_keys: ["main_images"]

    subprocessor_kwargs:
      video_processor:
        do_sample_frames: True
        fps: 14.4 # 24.0 * 0.6

    # Keep generation cheap for RL loop.
    max_new_tokens: 1024 # NOTE: mimic examples/agent/coding_online_rl/config/qwen2.5-1.5b-grpo-llm_judge.yaml
    temperature: 1.0
    use_chat_template: true

critic:
  use_critic_model: False

