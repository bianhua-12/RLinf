defaults:
  - env/maniskill_pick_cube_prompt@env.train
  - env/maniskill_pick_cube_prompt@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-7
    env: 0-7
    rollout: 0-7

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_ppo_mlp_full_rollout_collect_200"
    logger_backends: ["tensorboard"]

  max_epochs: 300
  max_steps: 300

  only_eval: False
  eval_policy_path: null
  val_check_interval: 9999
  save_interval: 9999

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 1
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.8
  gae_lambda: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 512
    wrap_obs_mode: simple_prompt
    use_full_state: True
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    is_eval: False
    init_params:
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      human_render_camera_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: False
      info_on_video: False
      video_base_dir: ${runner.logger.log_path}/video/train
    data_collection:
      enabled: True
      save_dir: ${runner.logger.log_path}/raw_episodes/train
      export_format: "pickle"
      only_success: False

  eval:
    total_num_envs: 16
    wrap_obs_mode: simple_prompt
    use_full_state: True
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    is_eval: True
    init_params:
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      human_render_camera_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: False
      info_on_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval
    data_collection:
      enabled: False
      save_dir: ${runner.logger.log_path}/raw_episodes/eval
      export_format: "pickle"
      only_success: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: True

  model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: True

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 100
  global_batch_size: 800
  seed: 1234
  enable_offload: False

  rollout_dump:
    enabled: True
    interval: 1
    include_obs: True
    include_forward_inputs: True
    save_dir: ${runner.logger.log_path}/full_rollout_batches

  model:
    model_path: ""
    model_type: "mlp_policy"

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
