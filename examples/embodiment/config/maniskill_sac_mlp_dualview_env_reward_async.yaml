defaults:
  - env/maniskill_pick_cube_prompt@env.train
  - env/maniskill_pick_cube_prompt@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_sac_mlp_dualview_env_reward_async"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: 200
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: always
  gamma: 0.8
  tau: 0.01

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -4
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 10000
    sample_window_size: 10000
    min_buffer_size: 1
    auto_save: False
    save_checkpoint: False
    load_checkpoint: False

  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 32
    wrap_obs_mode: simple_prompt
    use_full_state: True
    auto_reset: True
    ignore_terminations: False
    use_rel_reward: False
    reward_mode: raw
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: False
    max_steps_per_rollout_epoch: 50
    max_episode_steps: 50
    init_params:
      id: "PickCubeDualView-v1"
      obs_mode: "rgb"
      control_mode: "pd_ee_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      human_render_camera_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: False
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    total_num_envs: 32
    wrap_obs_mode: simple_prompt
    use_full_state: True
    auto_reset: True
    ignore_terminations: True
    use_rel_reward: False
    reward_mode: raw
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: True
    max_steps_per_rollout_epoch: 50
    max_episode_steps: 50
    init_params:
      id: "PickCubeDualView-v1"
      obs_mode: "rgb"
      control_mode: "pd_ee_delta_pos"
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      sensor_configs:
        shader_pack: "default"
        width: 224
        height: 224
      human_render_camera_configs:
        shader_pack: "default"
        width: 224
        height: 224
      render_mode: all
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 1024
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  model:
    model_name: "mlp_policy"
    model_type: "mlp_policy"
    policy_setup: "panda-ee-dpos"
    action_dim: 4
    add_value_head: False
    add_q_head: True

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
