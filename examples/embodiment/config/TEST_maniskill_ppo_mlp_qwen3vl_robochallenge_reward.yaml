# ManiSkill PPO with state policy + Qwen3-VL reward model (RoboChallenge prompt)
# Minimal VRAM & wall-clock example config for validating VLMRewardModel pipeline.

defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model  # Use MLP policy with state
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: all
    env: all
    rollout: all
    reward: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "TEST_maniskill_ppo_qwen3vl_robochallenge_reward"
    logger_backends: ["tensorboard"]

  # Short run for quick functional validation.
  max_epochs: 5
  max_steps: -1

  only_eval: False
  eval_policy_path: null
  val_check_interval: 2
  save_interval: 5

  resume_dir: null

algorithm:
  update_epoch: 2
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.8
  gae_lambda: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

data:
  # RewardInferenceWorker 依赖 cfg.data.rollout_batch_size
  # 这里与 env.train.total_num_envs 对齐，保证 recv/batchsize 校验能通过
  rollout_batch_size: 4

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 4           # minimal env count to reduce VRAM and steps
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 25
    max_steps_per_rollout_epoch: 25
    use_full_state: True
    # RGB mode: obs contains both main_images (for reward) and states (for policy)
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"
      control_mode: None
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      render_mode: all

  eval:
    total_num_envs: 2
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 25
    max_steps_per_rollout_epoch: 25
    use_fixed_reset_state_ids: True
    group_size: 1
    use_full_state: True
    init_params:
      id: "PickCube-v1"
      obs_mode: "rgb"
      control_mode: None
      sim_backend: "gpu"
      sim_config:
        sim_freq: 100
        control_freq: 20
      render_mode: all

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ""
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128      # small batches to reduce VRAM and runtime
  global_batch_size: 128
  seed: 1234
  enable_offload: False

  # MLP policy uses state observation from ManiskillFullStateWrapper
  model:
    model_path: ""
    model_type: "mlp_policy"
    obs_dim: 42

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

# -----------------------------------------------------------------------------
# Reward Model Configuration: Qwen3-VL-4B-Instruct (RoboChallenge JSON prompt)
# -----------------------------------------------------------------------------
reward:
  use_reward_model: True
  group_name: "RewardGroup"

  # For quick functional check we keep terminal-mode reward (per-episode).
  reward_mode: "per_step"

  success_reward: 1.0
  fail_reward: 0.0
  combine_mode: "replace"
  reward_weight: 1.0
  env_reward_weight: 0.0

  model:
    model_type: "vlm"
    model_path: "/workspace/ckpts/Qwen3-VL-4B-Instruct"
    precision: "bf16"

    # Use RoboChallenge-style JSON prompt / parsing in VLMRewardModel.
    prompt_builder_name: "robochallenge_json"
    parse_fn_name: "robochallenge_json_judgement_confidence"

    # Keep generation cheap to minimize wall-clock and VRAM.
    max_new_tokens: 8
    temperature: 0.0
    use_chat_template: true

critic:
  use_critic_model: False

