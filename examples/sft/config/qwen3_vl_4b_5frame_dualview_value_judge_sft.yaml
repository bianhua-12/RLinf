defaults:
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1
  component_placement:
    actor: all

runner:
  task_type: sft
  logger:
    log_path: ${runner.output_dir}/${runner.experiment_name}
    project_name: rlinf
    experiment_name: ${runner.experiment_name}
    logger_backends: ["tensorboard"]
  max_epochs: 1000
  max_steps: 1000
  val_check_interval: 100
  save_interval: 100
  experiment_name: qwen3_vl_4b_5frame_dualview_value_judge_sft
  output_dir: /mnt/project_rlinf/ztx/RLinf/logs
  resume_dir: null
  per_worker_log: true

data:
  type: vlm
  dataset_name: "qwen_vl_video_sft"
  apply_chat_template: true
  use_chat_template: true
  train_data_paths: "/mnt/project_rlinf/ztx/RLinf/logs/qwen3_vl_5frame_dualview_value_judge/train/segments.jsonl"
  val_data_paths: "/mnt/project_rlinf/ztx/RLinf/logs/qwen3_vl_5frame_dualview_value_judge/eval/segments.jsonl"
  video_root: "/mnt/project_rlinf/ztx/RLinf/logs/qwen3_vl_5frame_dualview_value_judge"
  prompt_key: "prompt"
  answer_key: "answer"
  image_keys: []
  max_prompt_length: 4096
  lazy_loading: true
  num_workers: 64
  video_nframes: 5
  video_fps: null
  video_max_pixels: 200704
  shuffle: true
  seed: 42

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  eval_batch_size: 8
  global_batch_size: 8
  seed: 42

  model:
    model_type: "qwen3_vl"
    precision: bf16
    model_path: "/mnt/project_rlinf/ztx/RLinf/Qwen3-VL-4B-Instruct"
    attn_implementation: sdpa
    is_lora: true
    lora_rank: 16

  optim:
    lr: 1e-5
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    lr_scheduler: "cosine"
    total_training_steps: ${runner.max_steps}
    lr_warmup_steps: 50

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_orig_params: false
    use_liger_kernel: false
    fsdp_size: -1
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: fp32
      buffer_dtype: bf16
    amp_autocast:
      enabled: false
      precision: bf16
    grad_scaler:
      enabled: false

reward:
  use_reward_model: false

critic:
  use_critic_model: false
