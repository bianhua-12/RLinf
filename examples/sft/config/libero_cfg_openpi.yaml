defaults:
  - env/libero_10@env.train
  - env/libero_10@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/
    - file://${oc.env:REPO_PATH}/examples/embodiment/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "cfg_sft"
    logger_backends: ["tensorboard"]

  max_epochs: 30000
  max_steps: -1
  # Set > 0 to enable periodic evaluation. If env/rollout are configured,
  # evaluation runs in the LIBERO environment; otherwise actor.run_eval() is used.
  val_check_interval: -1
  save_interval: 5000
  resume_dir: null

data:
  num_workers: 8
  # Advantage tag: loads meta/advantages_{tag}.parquet from each dataset
  # If null, loads meta/advantages.parquet (legacy format)
  advantage_tag: null

  # Balance sampling weights by dataset length
  balance_dataset_weights: true

  # Random seed for mixture sampling
  seed: 42

  train_data_paths:
    - path: "/path/to/sft_dataset"
      type: "sft"
      weight: 1.0             # sampling weight
      # Optional explicit advantage parquet path. When set, this takes
      # precedence over data.advantage_tag and dataset-local meta/advantages*.parquet.
      # advantage_path: "/path/to/external/advantages_robometer-4B.parquet"
    # Add more datasets as needed:
    - path: "/path/to/collected_data"
      type: "rollout"
      weight: 1.0

env:
  group_name: "EnvGroup"
  channel:
    name: "env_buffer_list"
    queue_name: "obs_buffer"
    queue_size: 0
  enable_offload: False
  train:
    total_num_envs: 64
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
  eval:
    total_num_envs: 48
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    group_size: 1
    is_eval: True
    # Override this list to restrict periodic environment evaluation to a subset
    # of LIBERO tasks, e.g. task_id_filter: [0].
    task_id_filter: null
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  channel:
    name: ${env.channel.name}
    queue_name: "action_buffer"
    queue_size: 0
  mode: "colocate"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: True
  pipeline_stage_num: 1
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

algorithm:
  loss_type: actor
  adv_type: gae
  rollout_epoch: 8
  eval_rollout_epoch: 4
  sampling_params:
    do_sample: True
    use_greedy: False
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 64
  global_batch_size: 512
  seed: 0

  model:
    precision: null
    model_path: "/path/to/pi05_base_pytorch"
    model_type: "cfg_model"
    add_value_head: False
    openpi:
      config_name: "pi05_libero"
      detach_critic_input: True
      train_expert_only: False
      cfgrl_guidance_scale: 1.0
      unconditional_prob: 0.3
      guidance_type: "positive"

  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-10
    clip_grad: 1.0
    lr_scheduler: "constant"
    total_training_steps: 30000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
