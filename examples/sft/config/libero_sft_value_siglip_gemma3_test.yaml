# Test config for SigLIP-Gemma3 value model training — 5 steps, freeze VLM
#
# Architecture: SigLIP2-so400m (1152-dim) + Gemma3-270M (640-dim) + Gemma expert
# Forward mode: two-stage only (no interleaved)
#
# Usage:
#   bash run_value_sft.sh libero_sft_value_siglip_gemma3_test

defaults:
  - model/value_model@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "value_sft_siglip_gemma3_test"
    logger_backends: ["tensorboard"]

  max_epochs: 30000
  max_steps: 5
  val_check_interval: -1
  save_interval: 5

data:
  train_data_paths: ["dummy"]  # Required by validate_sft_cfg; FSDPValueSftWorker uses datasets list below
  datasets:
    - dataset_path: /mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot
      type: "sft"
      weight: 1.0
      robot_type: "libero"
      model_type: "pi05"
    - dataset_path: /mnt/project_rlinf_hs/liuzhihao/data_to_use/collected_data_40_eps
      type: "rollout"
      weight: 1.0
      robot_type: "libero"
      model_type: "pi05"

  train_num_workers: 2
  eval_num_workers: 0
  prefetch_factor: 2
  persistent_workers: false
  pin_memory: false
  value_prefix: "Value: "
  include_state: true
  gamma: 1.0
  action_horizon: 10
  num_return_bins: 201
  normalize_to_minus_one_zero: true
  include_next_obs: false
  action_dim: 7
  robot_type: "libero"
  model_type: "pi05"
  balance_weights: true
  seed: 42

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2
  global_batch_size: 16
  seed: 0

  model:
    precision: bf16
    model_type: "value_model"
    # SigLIP-Gemma3 backbone (instead of default PaliGemma)
    # Backbone weights are loaded via from_pretrained() from siglip_path/gemma3_path.
    # model_path is optional: set it to a previously trained ValueCriticModel checkpoint
    # directory to resume training. Leave unset to train from scratch.
    backbone_variant: "siglip_gemma3"
    siglip_path: "/mnt/project_rlinf/liuzhihao/pi06_model/siglip2-so400m-patch14-224"
    gemma3_path: "/mnt/project_rlinf/liuzhihao/pi06_model/gemma-3-270m"
    tokenizer_path: "/mnt/project_rlinf/liuzhihao/pi06_model/gemma-3-270m"
    # Critic expert
    critic_expert_variant: "gemma_1m"
    freeze_vlm: false
    # Value head
    num_bins: 201
    v_min: -1.0
    v_max: 0.0
    value_dropout: 0.0
    # Action params
    action_dim: 7
    action_horizon: 10

  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1e-10
    clip_grad: 1.0
    lr_scheduler: "constant"
    lr_warmup_steps: 0
    total_training_steps: 5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
