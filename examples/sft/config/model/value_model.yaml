model_type: "value_model"

# Model precision
precision: bf16

# LoRA settings (not supported for this model)
is_lora: false

# =====================================================================
# Critic architecture
# =====================================================================

# critic_expert_variant: Gemma expert model size
#   "gemma_50m" | "gemma_100m" | "gemma_150m" | "gemma_300m" | "gemma_2b"
critic_expert_variant: "gemma_100m"
expert_loss_type: "categorical"
# Value SFT logs a fixed metric union for both TensorBoard and W&B:
# loss, expert_loss, predicted/target value stats, categorical metrics,
# regression metrics, and the shared alias value_mae.

# =====================================================================
# Value head / regression loss
# =====================================================================
num_bins: 201           # number of discretization bins
v_min: -1.0             # minimum value for atom support
v_max: 0.0              # maximum value for atom support
value_dropout: 0.0      # dropout before value projection (e.g. 0.1)

# =====================================================================
# PI05 base model params
# =====================================================================
action_dim: 32
action_horizon: 50
max_token_len: 200

# paligemma_variant: VLM backbone size
#   "gemma_2b" (default)
paligemma_variant: "gemma_2b"

action_expert_variant: "gemma_300m"
freeze_vision_encoder: false
train_expert_only: false
forward_mode: "vla"
max_language_len: 50
stop_gradient_to_vlm: false

# =====================================================================
# Backbone: "paligemma" (default) | "siglip_gemma3" | "dinov3_gemma3" | "dinov3_pure_visual"
# =====================================================================
backbone_variant: "paligemma"
# Required for DINO/SigLIP backbones
vision_encoder_path: /path/to/vision-encoder
gemma3_path: /path/to/gemma-3-270m
aggregator_hidden_size: 256
aggregator_depth: 2
aggregator_num_heads: 4
aggregator_mlp_ratio: 4.0

# =====================================================================
# Checkpoint
# =====================================================================
# For paligemma: required. Points to PI05 checkpoint containing all weights.
# For Gemma3 backbones: optional. Points to a previously trained ValueCriticModel
#   checkpoint to resume training. Backbone weights are loaded via
#   from_pretrained() from vision_encoder_path/gemma3_path; leave unset to train
#   from scratch.
# model_path: "/path/to/checkpoint"
