model_type: "value_model"

# Model precision
precision: bf16

# LoRA settings (not supported for this model)
is_lora: false

# =====================================================================
# Backbone: DINOv3 pure visual
# =====================================================================
backbone_variant: "dinov3_pure_visual"
vision_encoder_path: /path/to/dinov3-89m

# =====================================================================
# Visual aggregator
# =====================================================================
aggregator_hidden_size: 256
aggregator_depth: 2
aggregator_num_heads: 4
aggregator_mlp_ratio: 4.0

# =====================================================================
# Value head
# =====================================================================
expert_loss_type: "categorical"
value_dropout: 0.0

# Shared compatibility fields
critic_expert_variant: "dummy"
num_bins: 201
v_min: -1.0
v_max: 0.0

# =====================================================================
# PI05 base model params
# =====================================================================
action_dim: 32
action_horizon: 50
max_token_len: 200

freeze_vision_encoder: true
freeze_vlm: true
train_expert_only: false
forward_mode: "vlm"
max_language_len: 0
stop_gradient_to_vlm: false

# Optional fine-tuned checkpoint to resume training.
# model_path: "/path/to/checkpoint"
