model_type: "value_model"

# Model precision
precision: bf16

# LoRA settings (not supported for this model)
is_lora: false

# =====================================================================
# Backbone: DINOv3-Gemma3
# =====================================================================
backbone_variant: "dinov3_gemma3"

# Paths to DINOv3 and Gemma3 pretrained weights
vision_encoder_path: /path/to/dinov3-89m
gemma3_path: /path/to/gemma-3-270m
tokenizer_path: /path/to/gemma-3-270m

# =====================================================================
# Critic architecture
# =====================================================================
critic_expert_variant: "gemma_50m"
expert_loss_type: "mse"

# MSE path predicts scalar values directly; keep range metadata only for
# checkpoint compatibility with shared inference entrypoints.
num_bins: 201
v_min: -1.0
v_max: 0.0
value_dropout: 0.0

# =====================================================================
# PI05 base model params
# =====================================================================
action_dim: 32
action_horizon: 50
max_token_len: 200

action_expert_variant: "gemma_300m"
freeze_vision_encoder: true
freeze_vlm: true
train_expert_only: false
forward_mode: "vla"
max_language_len: 50
stop_gradient_to_vlm: false

# =====================================================================
# Checkpoint
# =====================================================================
# Optional fine-tuned checkpoint to resume training.
# model_path: "/path/to/checkpoint"
