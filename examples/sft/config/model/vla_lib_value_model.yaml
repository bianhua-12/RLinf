model_type: "vla_lib_value_model"

# Model precision
precision: bf16

# LoRA settings (not supported for this model)
is_lora: false

# =====================================================================
# Critic architecture
# =====================================================================

# critic_expert_variant: Gemma expert model size
#   "gemma_50m" | "gemma_100m" | "gemma_150m" | "gemma_300m" | "gemma_2b"
critic_expert_variant: "gemma_100m"

# =====================================================================
# Value head (categorical loss)
# =====================================================================
num_bins: 201           # number of discretization bins
v_min: -1.0             # minimum value for atom support
v_max: 0.0              # maximum value for atom support

# =====================================================================
# PI05 base model params
# =====================================================================
action_dim: 32
action_horizon: 50
max_token_len: 200

# paligemma_variant: VLM backbone size
#   "gemma_2b" (default)
paligemma_variant: "gemma_2b"

action_expert_variant: "gemma_300m"
freeze_vision_encoder: false
train_expert_only: false
forward_mode: "vla"
max_language_len: 50
stop_gradient_to_vlm: false
discrete_state_input: false
exclude_cot_from_kv_cache: false

# =====================================================================
# Backbone implementation:
#   "paligemma"     -> PaliGemma + Gemma expert
#   "siglip_gemma3" -> SigLIP2 + Gemma3 + Gemma expert
#   "smolvlm"       -> SmolVLM2 + lightweight expert (SmolVLA-style)
# =====================================================================
backbone_variant: "paligemma"
# Required only when backbone_variant = "siglip_gemma3".
siglip_path: null
gemma3_path: null
# Required only when backbone_variant = "smolvlm".
smolvlm_path: null
smolvlm_load_vlm_weights: true
smolvlm_attention_mode: "cross_attn"
smolvlm_num_expert_layers: -1
smolvlm_num_vlm_layers: 16
smolvlm_self_attn_every_n_layers: 2
smolvlm_expert_width_multiplier: 0.75

# =====================================================================
# Checkpoint (set to load pretrained weights)
# =====================================================================
# model_path: "/path/to/checkpoint"
